name: Deploy MyMarhalah to CyberPanel VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build_assets:
    name: Build frontend assets
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP (Fix Ziggy Issue)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: 📦 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 Install NPM dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: 🏗️ Build Vite assets
        run: npm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: public/build
          if-no-files-found: error

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build_assets

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download built assets
        uses: actions/download-artifact@v4
        with:
          name: vite-build
          path: public/build

      - name: 🛠️ Backend Deploy & Cleanup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"

            # Sync kod terbaru dari GitHub
            git fetch --all
            git reset --hard origin/main

            # Setup Backend
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan storage:link || true

            # Fix Permissions secara automatik
            chmod -R 775 database storage
            chmod 666 database/database.sqlite
            # Gunakan chown jika perlu, tapi chmod 775/666 sudah memadai untuk CyberPanel
            find database storage -type d -exec chmod 775 {} +
            find database storage -type f -exec chmod 664 {} +
            chmod 666 database/database.sqlite

            # Kosongkan folder build lama dengan lebih selamat
            # Kita tidak padam seluruh folder supaya tidak mengganggu proses symlink
            rm -rf public/build/*
            mkdir -p public/build/

      - name: 🚀 Upload built assets to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "public/build/**/*"
          target: "${{ secrets.VPS_APP_PATH }}/public/build"
          strip_components: 2

      - name: ✨ Finalize & Restart LiteSpeed
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"

            # Optimasi Laravel
            php artisan optimize:clear
            php artisan optimize
            
            # Restart OpenLiteSpeed (CyberPanel)
            systemctl restart lsws