name: Deploy MyMarhalah to CyberPanel VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build_assets:
    name: Build frontend assets
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP (Fix Ziggy Issue)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: 📦 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 Install NPM dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: 🏗️ Build Vite assets
        run: npm run build

      - name: 📦 Zip build folder
        run: tar -czf vite-build.tar.gz -C public/build .

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: vite-build.tar.gz
          if-no-files-found: error

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build_assets

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download built assets
        uses: actions/download-artifact@v4
        with:
          name: vite-build
          path: .

      - name: 🛠️ Backend Deploy & Cleanup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"

            # Sync kod terbaru dari GitHub
            git fetch --all
            git reset --hard origin/main

            # Setup Backend
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan storage:link || true

            # Fix Permissions secara automatik
            chmod -R 775 database storage
            find database storage -type d -exec chmod 775 {} +
            find database storage -type f -exec chmod 664 {} +
            chmod 666 database/database.sqlite

            # Kosongkan folder build lama & sedia folder baru
            # Guna folder sementara supaya website tak crash semasa deploy
            rm -rf public/build_new
            mkdir -p public/build_new

      - name: 🚀 Upload build archive to VPS (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "vite-build.tar.gz"
          target: "${{ secrets.VPS_APP_PATH }}/public/build_new"

      - name: ✨ Unzip Assets & Finalize
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}/public/build_new"

            # Unzip fail assets ke folder sementara
            tar -xzf vite-build.tar.gz
            rm -f vite-build.tar.gz

            cd "${{ secrets.VPS_APP_PATH }}"

            # Pastikan manifest.json wujud sebelum swap
            if [ ! -f "public/build_new/manifest.json" ]; then
              echo "ERROR: manifest.json tidak dijumpai!"
              ls -la public/build_new/
              exit 1
            fi

            # Atomic swap: Buang lama, gantikan dengan baru
            rm -rf public/build
            mv public/build_new public/build

            # Optimasi Laravel
            php artisan optimize:clear
            php artisan optimize

            # Fix final permissions
            chmod -R 775 public/build

            # Restart OpenLiteSpeed (CyberPanel)
            systemctl restart lsws